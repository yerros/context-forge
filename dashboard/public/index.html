<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>forge-office</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c2330; --line:#2a3242;
    --text:#dbe2ee; --dim:#8b96a8; --accent:#7c6cf0; --green:#3fb950;
    --amber:#d29922; --red:#f85149; --cyan:#39c5cf;
  }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);
    font:14px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:10px 16px;
    border-bottom:1px solid var(--line);background:var(--panel)}
  header h1{font-size:15px;margin:0;font-weight:700}
  header .proj{color:var(--cyan);font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
  .dot.on{background:var(--green)}
  .meta{margin-left:auto;color:var(--dim);font-size:12px;display:flex;gap:14px}
  .badge{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:1px 8px;font-size:11px;color:var(--dim)}
  main{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.15fr);gap:12px;
    padding:12px 16px;max-width:1600px;margin:0 auto}
  @media(max-width:1150px){main{grid-template-columns:1fr}}
  section{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  section>h2{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);
    margin:0;padding:9px 12px;border-bottom:1px solid var(--line)}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;min-height:240px}
  .col h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin:2px 0 8px}
  .col h3 .n{color:var(--text)}
  .card{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--line);
    border-radius:7px;padding:7px 9px;margin-bottom:7px;font-size:12.5px;word-wrap:break-word}
  .card.wip{border-left-color:var(--amber)}
  .card.next{border-left-color:var(--accent)}
  .card.done{border-left-color:var(--green);color:var(--dim)}
  .card .tag{display:inline-block;font-size:10px;border-radius:8px;padding:0 6px;margin-left:5px;vertical-align:1px}
  .tag.high{background:#3d2b12;color:var(--amber)}
  .tag.claim{background:#14283d;color:var(--cyan)}
  .tag.att{background:#3a1618;color:var(--red)}
  .empty{color:var(--dim);font-size:12px;font-style:italic;padding:4px 2px}
  #office{display:block;width:100%;image-rendering:pixelated;background:#7d828c}
  #feed{list-style:none;margin:0;padding:6px 0;max-height:300px;overflow-y:auto}
  #feed li{display:flex;gap:10px;padding:4px 14px;font-size:12px;border-bottom:1px solid #1a2030}
  #feed .t{color:var(--dim);white-space:nowrap;font-variant-numeric:tabular-nums}
  #feed .ev{color:var(--cyan)} #feed .ex{color:var(--dim)}
  .locks{padding:8px 12px;font-size:12px;color:var(--dim);border-top:1px solid var(--line)}
  .locks b{color:var(--amber)}
  footer{color:var(--dim);text-align:center;font-size:11px;padding:8px 0 16px}
</style>
</head>
<body>
<header>
  <div class="dot" id="conn"></div>
  <h1>forge-office · <span class="proj" id="proj">…</span></h1>
  <span class="badge" id="phase"></span>
  <div class="meta">
    <span id="schema" class="badge"></span>
    <span id="skillnow" class="badge"></span>
    <span id="updated"></span>
  </div>
</header>

<main>
  <div style="display:flex;flex-direction:column;gap:12px;min-width:0">
    <section>
      <h2>Board — progress tracker</h2>
      <div class="board">
        <div class="col"><h3>Next Up <span class="n" id="n-next"></span></h3><div id="c-next"></div></div>
        <div class="col"><h3>In Progress <span class="n" id="n-wip"></span></h3><div id="c-wip"></div></div>
        <div class="col"><h3>Completed <span class="n" id="n-done"></span></h3><div id="c-done"></div></div>
      </div>
      <div class="locks" id="locks"></div>
    </section>
    <section>
      <h2>Activity feed <span style="float:right;color:var(--dim);text-transform:none" id="feedhint"></span></h2>
      <ul id="feed"></ul>
    </section>
    <section>
      <h2>Session notes</h2>
      <ul id="notes" style="list-style:none;margin:0;padding:8px 14px;font-size:12px;color:var(--dim)"></ul>
    </section>
  </div>

  <div style="display:flex;flex-direction:column;gap:12px;min-width:0">
    <section>
      <h2>The office</h2>
      <canvas id="office" width="960" height="680"></canvas>
    </section>
  </div>
</main>
<footer>forge-office — read-only window into a Context Forge project · 127.0.0.1 only</footer>

<script>
/* ------------------------------------------------------------------ data - */
const $ = (id) => document.getElementById(id);
let state = null;

async function refresh() {
  try {
    const [s, f] = await Promise.all([
      fetch("/api/state").then(r => r.json()),
      fetch("/api/feed?n=120").then(r => r.json()),
    ]);
    state = s;
    renderHeader(s); renderBoard(s); renderFeed(f); renderNotes(s);
    office.setActive(activeAgents(s));
  } catch (e) { /* transient — SSE reconnect will retrigger */ }
}

function activeAgents(s) {
  const set = new Map();
  for (const sess of s.sessions || [])
    for (const a of sess.agents || []) set.set(a.agent, a.since);
  return set;
}

function connect() {
  const es = new EventSource("/events");
  es.onopen = () => $("conn").classList.add("on");
  es.onerror = () => { $("conn").classList.remove("on"); };
  es.addEventListener("update", refresh);
  es.addEventListener("hello", refresh);
}
connect();
setInterval(refresh, 15000);

/* ------------------------------------------------------------------ board  */
function esc(x){const d=document.createElement("div");d.textContent=x;return d.innerHTML}

function renderHeader(s) {
  $("proj").textContent = s.project;
  $("phase").textContent = s.tracker.phase || "";
  $("phase").style.display = s.tracker.phase ? "" : "none";
  $("schema").textContent = "schema " + s.schema;
  const skills = (s.sessions||[]).filter(x => x.skillState === "active").map(x => x.skill);
  $("skillnow").textContent = skills.length ? "⚒ " + skills.join(", ") : "idle";
  $("updated").textContent = new Date(s.generatedAt).toLocaleTimeString();
}

function renderBoard(s) {
  const claims = Object.fromEntries((s.claims||[]).map(c => [String(Number(c.unit)), c]));
  const unitOf = (t) => { const m = t.match(/(?:unit\s*)?0*(\d{1,3})\b/i); return m ? m[1] : null; };

  const next = [...s.tracker.nextUp];
  for (const p of (s.plan.pending||[]))
    if (!next.some(t => unitOf(t) === String(p.unit))) next.push(p.text + (p.high ? " [complexity: high]" : ""));

  fill("c-next","n-next", next.map(t => card(t,"next",claims,unitOf)));
  fill("c-wip","n-wip", s.tracker.inProgress.map(i => {
    let extra = i.attempts.length ? `<span class="tag att">${i.attempts.length} failed attempt${i.attempts.length>1?"s":""}</span>` : "";
    return card(i.text,"wip",claims,unitOf,extra);
  }));
  fill("c-done","n-done", s.tracker.completed.slice(0,12).map(t => card(t,"done",claims,unitOf)));

  const locks = (s.locks||[]).map(l => `lock <b>${esc(l.name)}</b> (${l.ageMin}m${l.stale?" · STALE":""})`);
  const claimTxt = (s.claims||[]).map(c => `claim unit <b>${esc(c.unit)}</b>${c.mode==="build"?" (in-place)":""}`);
  $("locks").innerHTML = locks.concat(claimTxt).join(" · ") || "no locks, no claims";
}

function card(text, cls, claims, unitOf, extra="") {
  const u = unitOf(text);
  const high = /\[complexity:\s*high\]/i.test(text);
  const claim = u && claims[String(Number(u))];
  return `<div class="card ${cls}">${esc(text.replace(/\[complexity:\s*high\]/i,"").trim())}` +
    (high ? `<span class="tag high">high</span>` : "") +
    (claim ? `<span class="tag claim">claimed</span>` : "") + extra + `</div>`;
}

function fill(cid, nid, cards) {
  $(cid).innerHTML = cards.join("") || `<div class="empty">(none)</div>`;
  $(nid).textContent = cards.length ? `· ${cards.length}` : "";
}

function renderNotes(s) {
  $("notes").innerHTML = (s.tracker.notes.slice(0,8).map(n => `<li>• ${esc(n)}</li>`).join("")) ||
    `<li class="empty">(no session notes)</li>`;
}

function renderFeed(events) {
  $("feedhint").textContent = events.length ? "" : "waiting for events (plugin ≥0.29 records automatically)";
  $("feed").innerHTML = events.map(e => {
    const extras = Object.entries(e).filter(([k]) => !["ts","event","project"].includes(k))
      .map(([k,v]) => `${k}=${v}`).join(" ");
    return `<li><span class="t">${esc((e.ts||"").replace("T"," "))}</span>` +
      `<span class="ev">${esc(e.event||"")}</span><span>${esc(e.project||"")}</span>` +
      `<span class="ex">${esc(extras)}</span></li>`;
  }).join("");
}

/* ================================================================== OFFICE
   Pixel-art scene, procedurally drawn (no image assets).
   Logical resolution 480x340, scaled 2x, crisp pixels.                    */

const ROSTER = [
  { id:"forge-architect",      label:"Arch",    shirt:"#e8c531", hair:"#7a4a21", desk:"boss"  },
  { id:"forge-reviewer",       label:"Review",  shirt:"#d43d3d", hair:"#26221e", desk:"L0" },
  { id:"forge-tester",         label:"Test",    shirt:"#2ea043", hair:"#e8c531", desk:"L1" },
  { id:"forge-aligner",        label:"Align",   shirt:"#d29922", hair:"#6b3f1d", desk:"L2" },
  { id:"forge-failure-hunter", label:"Hunter",  shirt:"#b34038", hair:"#1f1b18", desk:"L3" },
  { id:"forge-typer",          label:"Typer",   shirt:"#3b6fd4", hair:"#3a2c1c", desk:"R0" },
  { id:"forge-commenter",      label:"Comment", shirt:"#9a5bd4", hair:"#c9762a", desk:"R1" },
  { id:"forge-scout",          label:"Scout",   shirt:"#2fb3bd", hair:"#4a3620", desk:"R2" },
  { id:"forge-archivist",      label:"Archive", shirt:"#8b96a8", hair:"#6d6d6d", desk:"R3" },
];

const office = (() => {
  const cv = $("office"), ctx = cv.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const S = 2;                       // device pixels per logical pixel
  const W = 480, H = 340;
  ctx.scale(S, S);

  /* ---- layout ---- */
  const DESK_POS = {
    boss: { x: 240, y: 96 },
    L0: { x: 78,  y: 152 }, L1: { x: 148, y: 152 },
    L2: { x: 78,  y: 216 }, L3: { x: 148, y: 216 },
    R0: { x: 342, y: 152 }, R1: { x: 412, y: 152 },
    R2: { x: 342, y: 216 }, R3: { x: 412, y: 216 },
  };
  const MEET   = { x: 245, y: 188 };
  const LOUNGE = { x: 105, y: 292, rx: 70, ry: 22 };
  const bodies = ROSTER.map(r => ({
    ...r, ...spawn(), tx: 0, ty: 0, wanderAt: 0, facing: 1,
  }));
  function spawn(){ return { x: LOUNGE.x + rnd(-50,50), y: LOUNGE.y + rnd(-16,16) }; }
  const pet = { x: 250, y: 300, tx: 250, ty: 300, wanderAt: 0 };

  let activeSet = new Map();
  function setActive(m){ activeSet = m; }

  /* ---- pixel helpers ---- */
  function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, w, h); }
  function text(str, x, y, c, size=8, bold=true, align="center") {
    ctx.fillStyle = c; ctx.textAlign = align;
    ctx.font = `${bold?"bold ":""}${size}px monospace`;
    ctx.fillText(str, x, y);
  }

  /* ---- furniture ---- */
  function drawDesk(x, y, wide=false, topColor="#8a6a4a") {
    const w = wide ? 76 : 48, h = 17;
    px(x-w/2, y, w, h, topColor);                       // top
    px(x-w/2, y, w, 2, shade(topColor, 24));            // top edge highlight
    px(x-w/2, y+h, w, 3, shade(topColor, -40));         // front shadow
    px(x-w/2+2, y+h+3, 4, 4, "#4c3a28"); px(x+w/2-6, y+h+3, 4, 4, "#4c3a28"); // legs
    // monitor(s)
    const mons = wide ? [x-22, x+4] : [x-9];
    for (const mx of mons) {
      px(mx, y-11, 18, 12, "#20242c");
      px(mx+1, y-10, 16, 9, "#2f6fd9");
      px(mx+2, y-9, 7, 2, "#7db4ff");
      px(mx+7, y+1, 4, 3, "#20242c");
    }
  }
  function drawMeetingTable(x, y) {
    px(x-52, y-16, 104, 32, "#7a5c40");
    px(x-52, y-16, 104, 2, "#96754f");
    px(x-52, y+16, 104, 3, "#57402a");
    px(x-8, y-6, 16, 9, "#2f6fd9");                    // shared screen
    for (const cx of [-38,-14,10,34]) { px(x+cx, y-26, 9, 7, "#3d4553"); px(x+cx, y+22, 9, 7, "#3d4553"); }
  }
  function drawPingPong(x, y) {
    px(x-32, y-14, 64, 28, "#1e7e34");
    px(x-32, y-14, 64, 2, "#2ba24a");
    px(x-1, y-14, 2, 28, "#e8e8e8");
    px(x-32, y-1, 64, 2, "#e8e8e8");
    px(x-32, y+14, 64, 3, "#14571f");
  }
  function drawCouch(x, y, w=64) {
    px(x, y, w, 15, "#23262c"); px(x, y-5, w, 6, "#2c3038");
    px(x-3, y-5, 4, 20, "#1b1e23"); px(x+w-1, y-5, 4, 20, "#1b1e23");
  }
  function drawBookshelf(x, y) {
    px(x, y, 34, 42, "#6a4e30"); px(x+1, y+1, 32, 40, "#553d24");
    for (let r=0; r<3; r++) {
      let bx = x+3;
      for (const c of ["#d0483e","#3b6fd4","#2ea043","#d29922","#9a5bd4","#39c5cf"]) {
        px(bx, y+4+r*13, 4, 9, c); bx += 5;
      }
    }
  }
  function drawVending(x, y) {
    px(x, y, 26, 40, "#c03030"); px(x+2, y+2, 15, 28, "#1b2530");
    for (let r=0;r<4;r++) for (let c=0;c<3;c++) px(x+4+c*4, y+4+r*6, 3, 4, ["#e8c531","#39c5cf","#e06ad4"][c]);
    px(x+19, y+4, 5, 12, "#8c1f1f");
  }
  function drawCabinet(x, y) {
    px(x, y, 16, 22, "#9aa2ad"); px(x+2, y+2, 12, 8, "#7d8590"); px(x+2, y+12, 12, 8, "#7d8590");
    px(x+6, y+5, 4, 2, "#5d646e"); px(x+6, y+15, 4, 2, "#5d646e");
  }
  function drawPlant(x, y) {
    px(x+2, y+8, 8, 7, "#a5502e"); px(x+3, y+8, 6, 2, "#c26439");
    px(x+4, y, 4, 8, "#2ea043"); px(x+1, y+2, 4, 5, "#1f7a33"); px(x+7, y+2, 4, 5, "#1f7a33");
  }
  function drawWindow(x, y) {
    px(x, y, 30, 24, "#3d4757"); px(x+2, y+2, 26, 20, "#141d33");
    px(x+14, y+2, 2, 20, "#3d4757"); px(x+2, y+11, 26, 2, "#3d4757");
    px(x+6, y+5, 2, 2, "#cfd8ea"); px(x+21, y+15, 2, 2, "#cfd8ea"); px(x+11, y+16, 1, 1, "#8fa0c0");
  }
  function drawWaterCooler(x, y) {
    px(x+2, y, 8, 8, "#bcd6f2"); px(x, y+8, 12, 16, "#e8ecf2"); px(x+3, y+12, 6, 3, "#39c5cf");
  }
  function drawKitchen(x, y) {
    px(x, y, 78, 16, "#e4e7ec"); px(x, y+16, 78, 3, "#b9bec8");
    px(x+6, y+3, 16, 9, "#8f97a3");                     // sink
    px(x+30, y+3, 12, 9, "#20242c"); px(x+32, y+5, 8, 5, "#39c5cf"); // microwave
  }
  function drawDartboard(x, y) {
    px(x-1, y-1, 12, 12, "#3a2c1c"); px(x+1, y+1, 8, 8, "#d0483e");
    px(x+3, y+3, 4, 4, "#e8e8e8"); px(x+4, y+4, 2, 2, "#1b1e23");
  }
  function drawPet(t) {
    const b = pet;
    if (t > b.wanderAt) { b.tx = 210 + rnd(0,110); b.ty = 285 + rnd(0,25); b.wanderAt = t + rnd(3000,8000); }
    b.x += (b.tx-b.x)*0.03; b.y += (b.ty-b.y)*0.03;
    const x = b.x|0, y = b.y|0, hop = Math.abs(Math.sin(t/300))*1.5;
    px(x-5, y-3-hop, 10, 6, "#d0483e");                 // body
    px(x-3, y-5-hop, 6, 3, "#d0483e");
    px(x-2, y-5-hop, 1, 1, "#1b1e23"); px(x+1, y-5-hop, 1, 1, "#1b1e23"); // eyes
    px(x-8, y-4-hop, 3, 3, "#b53a31"); px(x+5, y-4-hop, 3, 3, "#b53a31"); // claws
    px(x-5, y+3-hop, 2, 2, "#8c2b24"); px(x+3, y+3-hop, 2, 2, "#8c2b24"); // legs
    text("Forgy", x, y+12, "#e8d5b0", 6);
  }

  /* ---- character ---- */
  const SKIN = "#e8b98c";
  function drawChar(b, t) {
    const isActive = activeSet.has(b.id);
    const moving = Math.hypot(b.tx-b.x, b.ty-b.y) > 2;
    const frame = moving ? (Math.floor(t/160)%2) : 0;
    const x = b.x|0, y = b.y|0;                         // y = feet baseline
    const bob = isActive && !moving ? (Math.floor(t/400)%2) : 0;

    // shadow
    px(x-6, y-1, 12, 2, "rgba(0,0,0,.25)");
    // legs (pants)
    const pants = "#31415e";
    if (moving) {
      px(x-4, y-8+(frame?1:0), 3, 8-(frame?1:0), pants);
      px(x+1, y-8+(frame?0:1), 3, 8-(frame?0:1), pants);
    } else { px(x-4, y-8, 3, 8, pants); px(x+1, y-8, 3, 8, pants); }
    px(x-5, y-2, 4, 2, "#1b1e23"); px(x+1, y-2, 4, 2, "#1b1e23"); // shoes
    // torso
    px(x-6, y-18+bob, 12, 10, b.shirt);
    px(x-6, y-18+bob, 12, 2, shade(b.shirt, 26));
    // arms
    px(x-8, y-17+bob, 2, 7, b.shirt); px(x+6, y-17+bob, 2, 7, b.shirt);
    px(x-8, y-10+bob, 2, 2, SKIN); px(x+6, y-10+bob, 2, 2, SKIN);
    // head
    px(x-5, y-28+bob, 10, 10, SKIN);
    // hair
    px(x-5, y-29+bob, 10, 4, b.hair); px(x-6, y-27+bob, 2, 4, b.hair); px(x+4, y-27+bob, 2, 4, b.hair);
    // eyes
    px(x-3, y-23+bob, 2, 2, "#1b1e23"); px(x+2, y-23+bob, 2, 2, "#1b1e23");
    // name tag
    const w = b.label.length*5+8;
    px(x-w/2, y-40+bob, w, 9, b.shirt);
    px(x-w/2, y-40+bob, w, 1, shade(b.shirt, 30));
    text(b.label, x, y-33+bob, "#fff", 7);
    // status badges
    if (isActive) {
      ctx.beginPath(); ctx.arc(x+w/2+5, y-36+bob, 4.5, 0, Math.PI*2); ctx.fillStyle="#20242c"; ctx.fill();
      text("⚙", x+w/2+5, y-33+bob, "#cfd8ea", 7, false);
      const dots = ".".repeat(1+Math.floor(t/420)%3);
      text(dots, x+10, y-24+bob, "#fff", 9);
    }
  }

  /* ---- scene ---- */
  function drawScene(t, meeting) {
    // floor checker
    for (let ty=0; ty<H; ty+=20) for (let tx=0; tx<W; tx+=20)
      px(tx, ty, 20, 20, ((tx+ty)/20)%2 ? "#8f939b" : "#9b9fa7");
    // zones tint
    px(24, 130, 180, 120, "rgba(53,99,201,.06)");
    px(300, 130, 156, 120, "rgba(210,105,30,.07)");
    // wall
    px(0, 0, W, 46, "#333d4d"); px(0, 44, W, 3, "#232b38"); px(0, 0, W, 3, "#28303e");
    drawWindow(16, 9); drawWindow(180, 9); drawWindow(300, 9);
    text("LOUNGE", 92, 22, "#39c5cf", 12);
    text("KITCHEN", 424, 22, "#f85149", 12);
    ctx.beginPath(); ctx.arc(250, 16, 7, 0, Math.PI*2); ctx.fillStyle="#e8ecf2"; ctx.fill();
    ctx.strokeStyle="#20242c"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(250,16); ctx.lineTo(250,11); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(250,16); ctx.lineTo(254 - 8*((t/60000)%1>.5), 16); ctx.stroke();
    // top furniture
    drawBookshelf(24, 52); drawCouch(70, 62);
    drawKitchen(380, 50); drawVending(446, 70); drawWaterCooler(388, 72);
    // section bars
    px(24, 118, 180, 8, "#3563c9"); px(24, 118, 180, 2, "#5a86e0");
    drawCabinet(28, 100); drawCabinet(186, 100);
    px(300, 118, 156, 8, "#cf6a1e"); px(300, 118, 156, 2, "#e88b45");
    drawCabinet(304, 100); drawCabinet(438, 100);
    // desks
    drawDesk(DESK_POS.boss.x, DESK_POS.boss.y, true, "#b7a23a");
    for (const k of ["L0","L1","L2","L3","R0","R1","R2","R3"]) drawDesk(DESK_POS[k].x, DESK_POS[k].y);
    // center
    drawMeetingTable(MEET.x, MEET.y + 14);
    drawPingPong(250, 262);
    drawDartboard(300, 246); drawPlant(456, 246); drawPlant(10, 246); drawPlant(222, 60);
    // lounge rug
    px(LOUNGE.x-58, LOUNGE.y-16, 116, 34, "rgba(57,197,207,.08)");
    text("lounge ☕", LOUNGE.x, LOUNGE.y - 22, "#5d6875", 7);
    if (meeting) text("review in session…", MEET.x, MEET.y + 52, "#e8d5b0", 8);
  }

  /* ---- loop ---- */
  function tick(t) {
    const actives = bodies.filter(b => activeSet.has(b.id));
    const meeting = actives.length >= 3;

    for (const b of bodies) {
      const isActive = activeSet.has(b.id);
      if (isActive && meeting && b.desk !== "boss") {
        const i = actives.indexOf(b);
        const side = i % 2 ? -1 : 1, slot = Math.floor(i/2);
        b.tx = MEET.x - 38 + slot*24 + 4; b.ty = MEET.y + (side<0 ? -12 : 42);
      } else if (isActive) {
        const d = DESK_POS[b.desk] || DESK_POS.boss;
        b.tx = d.x + (b.desk==="boss" ? 12 : 0); b.ty = d.y - 2;
      } else if (t > b.wanderAt) {
        const a = Math.random()*Math.PI*2;
        b.tx = LOUNGE.x + Math.cos(a)*LOUNGE.rx*Math.random();
        b.ty = LOUNGE.y + Math.sin(a)*LOUNGE.ry*Math.random();
        b.wanderAt = t + rnd(2600, 8000);
      }
      b.x += (b.tx-b.x)*0.05; b.y += (b.ty-b.y)*0.05;
    }

    ctx.clearRect(0, 0, W, H);
    drawScene(t, meeting);
    for (const b of [...bodies].sort((a,z) => a.y - z.y)) drawChar(b, t);
    drawPet(t);
    requestAnimationFrame(tick);
  }

  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, Math.max(0, (n>>16)+amt));
    const g = Math.min(255, Math.max(0, ((n>>8)&255)+amt));
    const b = Math.min(255, Math.max(0, (n&255)+amt));
    return `rgb(${r},${g},${b})`;
  }
  function rnd(a,b){ return a + Math.random()*(b-a); }

  requestAnimationFrame(tick);
  return { setActive };
})();

refresh();
</script>
</body>
